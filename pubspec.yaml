name: yummy
description: Echelon is a premium car-sharing demo for discovering vehicles and reserving trips

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.0.1
  url_launcher: ^6.2.1
  uuid: ^4.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  http: ^1.1.0
  drift: ^2.19.1
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.3
  build_runner: ^2.4.11
  drift_dev: ^2.19.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/data/
    - assets/categories/
    - assets/restaurants/
    - assets/profile_pics/
    - assets/food/
